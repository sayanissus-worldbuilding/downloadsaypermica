<!DOCTYPE html>
<html>
<head>
  <title>Saypermica</title>

  <style>
    /* ✅ LOAD LOCAL FONT */
    @font-face {
      font-family: "Tiro Bangla";
      src: url("TiroBangla-Regular.ttf") format("truetype");
    }

    body {
      margin: 0;
      font-family: "Tiro Bangla", sans-serif;
    }

    #topbar {
      display: flex;
      padding: 8px;
      background: #050;
      color: white;
      gap: 5px;
    }

    input {
      flex: 1;
      padding: 5px;
      font-family: inherit;
    }

    button {
      padding: 5px 10px;
      font-family: inherit;
    }

    #tabs {
      display: flex;
      background: #140;
      color: white;
      padding: 5px;
      gap: 5px;
    }

    .tab {
      background: #050;
      padding: 5px;
      cursor: pointer;
      border-radius: 10px;
      font-family: inherit;
    }

    .tab.active {
      background: #080;
    }

    webview {
      width: 100%;
      height: calc(100vh - 80px);
    }

    /* 📥 DOWNLOADS FULLSCREEN PANEL */
    #downloadsPanel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      color: white;
      display: none;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
      z-index: 9999;
      font-family: inherit;
    }

    #downloadsHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 20px;
      margin-bottom: 20px;
    }

    #closeDownloads {
      cursor: pointer;
      font-size: 24px;
      padding: 5px 10px;
      background: red;
      border: none;
      color: white;
      border-radius: 6px;
      font-family: inherit;
    }

    .downloadItem {
      background: #222;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      font-family: inherit;
    }
  </style>
</head>

<body>

  <div id="tabs"></div>

  <div id="topbar">
    <button onclick="back()">⬅</button>
    <button onclick="forward()">➡</button>
    <button onclick="reload()">↺</button>

    <input id="urlbar" placeholder="Enter URL" />
    <button onclick="go()">Go</button>
    <button onclick="newTab()">＋</button>

    <button onclick="openDownloads()">⬇ Downloads</button>
  </div>

  <div id="views"></div>

  <!-- 📥 DOWNLOAD PANEL -->
  <div id="downloadsPanel">
    <div id="downloadsHeader">
      <b>Downloads</b>
      <button id="closeDownloads" onclick="closeDownloads()">✖</button>
    </div>

    <div id="downloadList"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
